name: OpenFX Trade History Export

on:
  workflow_dispatch:

jobs:
  openfx-export:
    runs-on: self-hosted
    timeout-minutes: 45

    env:
      OPENFX_EMAIL: ${{ secrets.OPENFX_EMAIL }}
      OPENFX_PASSWORD: ${{ secrets.OPENFX_PASSWORD }}
      OPENFX_TOTP_SECRET: ${{ secrets.OPENFX_TOTP_SECRET }}

      OPENFX_HEADLESS: "false"
      OPENFX_SESSION_FILE: "openfx_session.pkl"
      OPENFX_SCREENSHOT_DIR: "screenshots"

      PYTHONUNBUFFERED: "1"

    steps:
      # ------------------------------------------------
      # Checkout Repository
      # ------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------
      # Setup Python
      # ------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------
      # Verify Python
      # ------------------------------------------------
      - name: Verify Python
        shell: powershell
        run: |
          python --version
          pip --version

      # ------------------------------------------------
      # Install Dependencies
      # ------------------------------------------------
      - name: Install Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip

          pip install ^
            selenium==4.24.0 ^
            selenium-stealth ^
            webdriver-manager ^
            pyotp==2.9.0

          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }

      # ------------------------------------------------
      # Verify Chrome
      # ------------------------------------------------
      - name: Verify Chrome
        shell: powershell
        run: |
          $chrome1 = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $chrome2 = "C:\Program Files (x86)\Google\Chrome\Application\chrome.exe"

          if (Test-Path $chrome1) {
            & $chrome1 --version
          }
          elseif (Test-Path $chrome2) {
            & $chrome2 --version
          }
          else {
            Write-Host "Chrome not found"
            exit 1
          }

      # ------------------------------------------------
      # Kill Old Chrome Processes
      # ------------------------------------------------
      - name: Kill Old Chrome Processes
        shell: powershell
        run: |
          Get-Process chrome -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-Process chromedriver -ErrorAction SilentlyContinue | Stop-Process -Force

      # ------------------------------------------------
      # Create Screenshot Directory
      # ------------------------------------------------
      - name: Create Screenshot Directory
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path screenshots

      # ------------------------------------------------
      # Run Automation
      # ------------------------------------------------
      - name: Run OpenFX Export
        shell: powershell
        run: |
          python openfx_download_trade.py

      # ------------------------------------------------
      # Upload Screenshots
      # ------------------------------------------------
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openfx-screenshots
          path: screenshots/
          retention-days: 7

      # ------------------------------------------------
      # Upload Session File
      # ------------------------------------------------
      - name: Upload Session File
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openfx-session
          path: openfx_session.pkl
          retention-days: 7
