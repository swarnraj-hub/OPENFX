name: OpenFX Trade History Export

on:
  workflow_dispatch:

jobs:
  openfx-export:
    runs-on: self-hosted
    timeout-minutes: 45

    env:
      OPENFX_EMAIL: ${{ secrets.OPENFX_EMAIL }}
      OPENFX_PASSWORD: ${{ secrets.OPENFX_PASSWORD }}
      OPENFX_TOTP_SECRET: ${{ secrets.OPENFX_TOTP_SECRET }}

      OPENFX_HEADLESS: "false"

      OPENFX_SESSION_FILE: "openfx_session.pkl"
      OPENFX_SCREENSHOT_DIR: "screenshots"

      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python
        run: |
          python --version
          pip --version

      - name: Install Google Chrome (Linux only)
        if: runner.os == 'Linux'
        run: |
          if ! command -v google-chrome > /dev/null; then
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
            echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | \
              sudo tee /etc/apt/sources.list.d/google.list

            sudo apt-get update
            sudo apt-get install -y google-chrome-stable
          fi

      - name: Verify Chrome
        run: |
          google-chrome --version || true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            selenium==4.24.0 \
            selenium-stealth \
            webdriver-manager \
            pyotp==2.9.0

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Create Screenshot Directory
        run: |
          mkdir -p screenshots

      - name: Remove Old Session
        run: |
          rm -f openfx_session.pkl

      - name: Run OpenFX Export
        run: |
          python openfx_download_trade.py

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openfx-screenshots
          path: screenshots/
          retention-days: 7

      - name: Upload Session File
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openfx-session
          path: openfx_session.pkl
          retention-days: 7
