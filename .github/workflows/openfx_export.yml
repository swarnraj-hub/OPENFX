name: OpenFX Trade History Export

on:
  workflow_dispatch:

jobs:
  openfx-export:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      OPENFX_EMAIL:         ${{ secrets.OPENFX_EMAIL }}
      OPENFX_PASSWORD:      ${{ secrets.OPENFX_PASSWORD }}
      OPENFX_TOTP_SECRET:   ${{ secrets.OPENFX_TOTP_SECRET }}
      OPENFX_HEADLESS:      "true"
      OPENFX_SESSION_FILE:  "openfx_session.pkl"
      OPENFX_SCREENSHOT_DIR: "screenshots"
      PYTHONUNBUFFERED:     "1"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome and XVFB
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable xvfb
          google-chrome --version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            selenium==4.24.0 \
            undetected-chromedriver==3.5.5 \
            pyotp==2.9.0

      - name: Verify UC
        run: python -c "import undetected_chromedriver as uc; print('UC OK')"

      - name: Create Screenshot Directory
        run: mkdir -p screenshots

      - name: Run OpenFX Export
        run: |
          xvfb-run --auto-servernum \
          --server-args="-screen 0 1920x1080x24" \
          python openfx_download_trade.py

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openfx-screenshots
          path: screenshots/
          retention-days: 7
